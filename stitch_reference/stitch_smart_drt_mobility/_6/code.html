<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DRT Connect - Boarding Pass</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "tertiary-fixed-dim": "#bec6e0",
                        "surface-container-highest": "#d3e4fe",
                        "outline": "#737688",
                        "on-secondary-fixed": "#191c1e",
                        "surface-dim": "#cbdbf5",
                        "surface-container": "#e5eeff",
                        "background": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b7c4ff",
                        "outline-variant": "#c3c5d9",
                        "on-primary-fixed": "#001452",
                        "inverse-on-surface": "#eaf1ff",
                        "secondary": "#5c5f61",
                        "secondary-container": "#e0e3e5",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#dde1ff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-secondary-fixed-variant": "#444749",
                        "surface-variant": "#d3e4fe",
                        "surface-tint": "#004ced",

                        "on-primary": "#ffffff",

                        "on-background": "#0b1c30",

                    },
                    "fontFamily": {
                        "label-md": ["Inter", "sans-serif"],

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Ticket Shapes */
        .ticket-cutout-left {
            mask-image: radial-gradient(circle at 0 50%, transparent 16px, black 16px);
            -webkit-mask-image: radial-gradient(circle at 0 50%, transparent 16px, black 16px);
        }
        .ticket-cutout-right {
            mask-image: radial-gradient(circle at 100% 50%, transparent 16px, black 16px);
            -webkit-mask-image: radial-gradient(circle at 100% 50%, transparent 16px, black 16px);
        }
        .ticket-cutout-both {
            mask-image: radial-gradient(circle at 0 50%, transparent 16px, black 16px), radial-gradient(circle at 100% 50%, transparent 16px, black 16px);
            -webkit-mask-image: radial-gradient(circle at 0 50%, transparent 16px, black 16px), radial-gradient(circle at 100% 50%, transparent 16px, black 16px);
            mask-composite: intersect;
            -webkit-mask-composite: source-in;
        }
        .dash-border {
            background-image: linear-gradient(to right, #c3c5d9 50%, rgba(255,255,255,0) 0%);
            background-position: bottom;
            background-size: 16px 2px;
            background-repeat: repeat-x;
        }
        
        /* Scanner line animation */
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(200px); opacity: 0; }
        }
        .scanner-line {
            animation: scan 3s infinite linear;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen text-on-surface antialiased flex flex-col font-body-md md:hidden">
<!-- Top Navigation (Transactional intent implies closing this modal/view) -->
<header class="w-full flex justify-between items-center px-container-margin h-16 bg-surface-container-low sticky top-0 z-50">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface hover:bg-outline-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-on-surface">Boarding Pass</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col items-center px-container-margin pb-stack-lg pt-stack-sm w-full max-w-md mx-auto">
<!-- Status Indicator -->
<div class="flex items-center gap-2 mb-stack-lg bg-surface-container-highest px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 18px;">directions_bus</span>
<span class="text-label-md font-label-md text-on-surface-variant">Vehicle arriving in 3 mins</span>
</div>
<!-- Ticket Container -->
<div class="w-full bg-surface-container-lowest rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex flex-col relative overflow-hidden ticket-cutout-both">
<!-- Top Section: Route Info -->
<div class="p-6 pb-8 bg-surface-container-lowest">
<div class="flex justify-between items-center mb-6">
<span class="text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">Ride #DRT-8492</span>
<span class="px-3 py-1 bg-surface-container text-primary text-label-md font-label-md rounded-lg">Standard</span>
</div>
<!-- Route Timeline -->
<div class="relative pl-6">
<!-- Timeline Line -->
<div class="absolute left-[9px] top-2 bottom-2 w-0.5 bg-secondary-fixed"></div>
<!-- Pickup -->
<div class="relative mb-6">
<div class="absolute -left-[27px] top-0.5 w-5 h-5 rounded-full border-4 border-surface-container-lowest bg-primary shadow-sm z-10"></div>
<p class="text-label-md font-label-md text-on-surface-variant mb-0.5">Pickup • 08:45 AM</p>
<h2 class="text-headline-sm font-headline-sm text-on-surface">Central Station</h2>
<p class="text-body-md font-body-md text-on-surface-variant mt-1 text-sm">Zone A, Stand 4</p>
</div>
<!-- Dropoff -->
<div class="relative">
<div class="absolute -left-[27px] top-0.5 w-5 h-5 rounded-full border-4 border-surface-container-lowest bg-outline z-10"></div>
<p class="text-label-md font-label-md text-on-surface-variant mb-0.5">Dropoff • ~09:15 AM</p>
<h2 class="text-headline-sm font-headline-sm text-on-surface">Tech Campus North</h2>
</div>
</div>
</div>
<!-- Perforated Divider -->
<div class="h-8 w-full relative -my-4 flex items-center justify-center z-20">
<div class="w-full h-px dash-border absolute top-1/2 -translate-y-1/2"></div>
<!-- The cutouts are handled by the mask on the parent, but these visually reinforce the edge if mask fails -->
<div class="w-6 h-6 rounded-full bg-surface-container-low absolute -left-3 top-1 shadow-inner"></div>
<div class="w-6 h-6 rounded-full bg-surface-container-low absolute -right-3 top-1 shadow-inner"></div>
</div>
<!-- Bottom Section: QR Code -->
<div class="p-6 pt-8 bg-surface-container-lowest flex flex-col items-center">
<h3 class="text-headline-sm font-headline-sm text-on-surface mb-2">Show to Driver</h3>
<p class="text-body-md font-body-md text-on-surface-variant text-center mb-6 max-w-[250px]">Present this code when boarding the vehicle.</p>
<!-- QR Code Area -->
<div class="relative p-4 bg-surface-bright rounded-2xl border border-outline-variant shadow-sm mb-6 w-56 h-56 flex items-center justify-center">
<!-- Scanner Animation Line -->
<div class="absolute left-0 right-0 h-1 bg-primary/50 shadow-[0_0_10px_rgba(0,82,255,0.8)] z-20 scanner-line pointer-events-none rounded-full"></div>
<!-- Simulated QR Code (Using CSS for high contrast blocky look) -->
<div aria-label="QR Code" class="w-full h-full relative">
<!-- Corners -->
<div class="absolute top-0 left-0 w-12 h-12 border-4 border-on-surface rounded-md">
<div class="absolute inset-1.5 bg-on-surface rounded-sm"></div>
</div>
<div class="absolute top-0 right-0 w-12 h-12 border-4 border-on-surface rounded-md">
<div class="absolute inset-1.5 bg-on-surface rounded-sm"></div>
</div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-4 border-on-surface rounded-md">
<div class="absolute inset-1.5 bg-on-surface rounded-sm"></div>
</div>
<!-- Decorative blocks simulating QR data -->
<div class="absolute inset-0 grid grid-cols-8 grid-rows-8 gap-1 p-2 opacity-90 mix-blend-multiply">
<!-- Random blocks for visual texture -->
<div class="bg-on-surface col-start-4 row-start-2"></div>
<div class="bg-on-surface col-start-5 row-start-2 col-span-2"></div>
<div class="bg-on-surface col-start-8 row-start-3"></div>
<div class="bg-on-surface col-start-4 row-start-4 col-span-3"></div>
<div class="bg-on-surface col-start-2 row-start-5"></div>
<div class="bg-on-surface col-start-7 row-start-5 col-span-2"></div>
<div class="bg-on-surface col-start-4 row-start-6"></div>
<div class="bg-on-surface col-start-5 row-start-7 col-span-2"></div>
<div class="bg-on-surface col-start-8 row-start-8"></div>
<div class="bg-on-surface col-start-6 row-start-1"></div>
<div class="bg-on-surface col-start-4 row-start-8"></div>
</div>
</div>
</div>
<!-- Passenger Info -->
<div class="w-full flex justify-between items-center bg-surface p-4 rounded-xl">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<p class="text-label-md font-label-md text-on-surface-variant">Passenger</p>
<p class="text-body-md font-body-md text-on-surface font-medium">Alex Transit</p>
</div>
</div>
<div class="text-right">
<p class="text-label-md font-label-md text-on-surface-variant">Count</p>
<p class="text-headline-md font-headline-md text-primary">1</p>
</div>
</div>
</div>
</div>
<!-- Bottom Action -->
<div class="w-full mt-stack-lg pt-stack-md">
<button class="w-full py-4 rounded-full bg-surface-container-lowest text-primary border border-primary-container text-headline-sm font-headline-sm hover:bg-surface-container-low transition-colors shadow-sm">
                Cancel Ride
            </button>
</div>
</main>
<!-- Navigation suppressed due to focused transactional task (Boarding Pass) -->
</body></html>
