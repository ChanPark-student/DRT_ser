<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle ambient shadow for level 1 cards */
        .ambient-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        
        /* Interactive shadow for buttons/selectable cards */
        .interactive-shadow {
            box-shadow: 0 4px 12px rgba(0, 82, 255, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .interactive-shadow:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(0, 82, 255, 0.1);
        }

        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 82, 255, 0.1);
            border-color: #0052ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface shadow-sm">
<button aria-label="Menu" class="text-primary hover:bg-surface-container-low transition-colors rounded-full p-2 -ml-2">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-primary">DRT Connect</h1>
<button aria-label="Notifications" class="text-primary hover:bg-surface-container-low transition-colors rounded-full p-2 -mr-2">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 px-container-margin pb-safe-bottom flex flex-col items-center justify-center">
<div class="w-full max-w-md mx-auto flex flex-col gap-stack-lg">
<div class="text-center mb-stack-md">
<h2 class="text-display-lg font-display-lg text-on-surface mb-stack-sm">Select Service</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">What type of transport do you need today?</p>
</div>
<!-- Ride Card -->
<button class="service-card w-full bg-surface-lowest border border-outline-variant rounded-2xl p-stack-lg flex flex-col items-start gap-stack-md ambient-shadow text-left focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-4xl icon-fill">directions_bus</span>
</div>
<div>
<h3 class="text-headline-md font-headline-md text-on-surface mb-unit">Ride</h3>
<p class="text-body-md font-body-md text-on-surface-variant">Passenger transport to your destination. Shared or private options available.</p>
</div>
<div class="w-full flex justify-end mt-stack-sm">
<span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
</button>
<!-- Cargo Card -->
<button class="service-card w-full bg-surface-lowest border border-outline-variant rounded-2xl p-stack-lg flex flex-col items-start gap-stack-md ambient-shadow text-left focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center text-tertiary group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors duration-300">
<span class="material-symbols-outlined text-4xl icon-fill">local_shipping</span>
</div>
<div>
<h3 class="text-headline-md font-headline-md text-on-surface mb-unit">Cargo</h3>
<p class="text-body-md font-body-md text-on-surface-variant">Freight and package delivery services. Scheduled or on-demand logistics.</p>
</div>
<div class="w-full flex justify-end mt-stack-sm">
<span class="material-symbols-outlined text-tertiary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
</button>
</div>
</main>
<!-- Navigation Drawer (Hidden by default, structure provided per JSON but hidden for linear flow) -->
<aside aria-hidden="true" class="fixed inset-y-0 left-0 z-50 w-80 bg-surface-bright shadow-xl rounded-r-xl transform -translate-x-full transition-transform duration-300 flex flex-col h-full py-6 px-4" id="nav-drawer">
<div class="mb-8">
<h2 class="text-headline-sm font-headline-sm text-primary mb-1">Alex Transit</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Frequent Commuter</p>
<p class="text-label-md font-label-md text-secondary mt-2">Member since 2023</p>
</div>
<nav class="flex-grow flex flex-col gap-2">
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all text-body-md font-body-md" href="#">
<span class="material-symbols-outlined">payments</span> Payment Methods
             </a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all text-body-md font-body-md" href="#">
<span class="material-symbols-outlined">history</span> History
             </a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all text-body-md font-body-md" href="#">
<span class="material-symbols-outlined">help_outline</span> Support
             </a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all text-body-md font-body-md" href="#">
<span class="material-symbols-outlined">settings</span> Settings
             </a>
</nav>
<div class="mt-auto">
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all text-body-md font-body-md" href="#">
<span class="material-symbols-outlined">logout</span> Logout
             </a>
</div>
</aside>
<script>
        // Simple JS for card interactions
        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove active state from all
                document.querySelectorAll('.service-card').forEach(c => {
                    c.classList.remove('ring-2', 'ring-primary', 'border-transparent');
                });
                
                // Add active state to clicked
                this.classList.add('ring-2', 'ring-primary', 'border-transparent');
                
                // Visual feedback before hypothetical navigation
                const iconContainer = this.querySelector('div:first-child');
                const originalBg = iconContainer.className;
                
                // Temporary pulse effect
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                    // In a real app, navigation would happen here
                    console.log('Selected:', this.querySelector('h3').innerText);
                }, 150);
            });
        });

        // Drawer toggle logic
        const menuBtn = document.querySelector('header button:first-child');
        const drawer = document.getElementById('nav-drawer');
        
        menuBtn.addEventListener('click', () => {
            drawer.classList.toggle('-translate-x-full');
        });

        // Close drawer when clicking outside (simple implementation)
        document.addEventListener('click', (e) => {
            if (!drawer.contains(e.target) && !menuBtn.contains(e.target) && !drawer.classList.contains('-translate-x-full')) {
                drawer.classList.add('-translate-x-full');
            }
        });
    </script>
</body></html>
