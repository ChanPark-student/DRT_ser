<style>
        body {

        /* Map Marker Pulse Animation */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.6;

            80% {

            }
            100% {

<script>
        // Simple script to demonstrate drawer toggle logic
        document.querySelector('header button:first-child').addEventListener('click', () => {
            const drawer = document.getElementById('nav-drawer');
            drawer.classList.remove('-translate-x-full');
            
            // Add a temporary overlay to close it
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-on-surface/20 z-[55] transition-opacity backdrop-blur-sm';
            document.body.appendChild(overlay);
            
            overlay.addEventListener('click', () => {
                drawer.classList.add('-translate-x-full');
                overlay.remove();
            });
        });
    </script>
